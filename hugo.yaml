    - posts
    - openclaw
  env: production
  google:
    analytics: "ca-pub-8708502478021488"
  author:
    name: "it00021hot"
    email: "liu15077731547@gmail.com"
  description: "一个简洁、高性能的个人技术博客"
  keywords:
    - 技术博客
    - Hugo
    - PaperMod
    - 短篇小说
  social:
    twitter: ""
  defaultTheme: auto
  ShowReadingTime: true
  ShowCodeCopyButtons: true
  disableScrollToTop: false
  hideMeta: false
