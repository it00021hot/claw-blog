baseURL: "https://example.org/"
languageCode: "zh-cn"
title: "技术博客"
theme: ["PaperMod"]

menu:
  main:
    - name: 首页
      url: /
      weight: 1
    - name: 技术文章
      url: /tech/
      weight: 2
    - name: 短篇小说
      url: /fiction/
      weight: 3

outputs:
  home:
    - HTML
    - RSS

taxonomies:
  category: categories
  tag: tags
  series: series

params:
  author:
    name: "博客作者"
    email: "example@example.com"
  defaultTheme: auto
  ShowReadingTime: true
  ShowCodeCopyButtons: true
  disableScrollToTop: false
  hideMeta: false
  hideSummary: false
  showtoc: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true

markup:
  highlight:
    noClasses: false
    style: monokai
